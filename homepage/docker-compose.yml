---

services:
  config-sync:
    image: alpine
    restart: no
    volumes:
      - homepage_config:/config
    environment:
      GIT_REPO: ${GIT_REPO}
    command: sh -c "apk add --no-cache git -q && git clone --depth 1 $$GIT_REPO /tmp/repo && cp -r /tmp/repo/homepage/config/. /config/"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    depends_on:
      config-sync:
        condition: service_completed_successfully
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
    networks:
      - default
      - nginx_proxy_manager_default

volumes:
  homepage_config:

networks:
  nginx_proxy_manager_default:
    external: true
