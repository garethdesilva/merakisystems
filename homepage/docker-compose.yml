---

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    networks:
      - default
      - nginx_proxy_manager_default

networks:
  nginx_proxy_manager_default:
    external: true
